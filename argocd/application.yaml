cat > ~/Desktop/ТА/project-6/argocd/application.yaml << 'EOF'
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: watchlist
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MassonTG/gitops-argocd
    targetRevision: HEAD
    path: helm/watchlist
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: watchlist
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
EOF