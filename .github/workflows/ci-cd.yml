name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./docker/backend
          push: true
          tags: massontg/watchlist-backend:${{ steps.version.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./docker/frontend
          push: true
          tags: massontg/watchlist-frontend:${{ steps.version.outputs.tag }}

      - name: Update image tags in values.yaml
        run: |
          sed -i "s|backend: massontg/watchlist-backend:.*|backend: massontg/watchlist-backend:${{ steps.version.outputs.tag }}|" helm/watchlist/values.yaml
          sed -i "s|frontend: massontg/watchlist-frontend:.*|frontend: massontg/watchlist-frontend:${{ steps.version.outputs.tag }}|" helm/watchlist/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/watchlist/values.yaml
          git commit -m "ci: update image tags to ${{ steps.version.outputs.tag }}"
          git push