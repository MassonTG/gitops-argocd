<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- СТОРІНКА АВТОРИЗАЦІЇ -->
  <div id="page-auth" class="page active">
    <div class="auth-bg">
      <div class="auth-glow"></div>
    </div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">Watchlist</span>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Вхід</button>
          <button class="auth-tab" data-tab="register">Реєстрація</button>
        </div>
        <form id="auth-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="your@email.com" required/>
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="auth-password" placeholder="••••••••" required/>
          </div>
          <div id="auth-error" class="error-msg hidden"></div>
          <button type="submit" class="btn-primary" id="auth-submit">Увійти</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ГОЛОВНА СТОРІНКА -->
  <div id="page-main" class="page">
    <header class="header">
      <div class="header-left">
        <span class="logo-icon">▶</span>
        <span class="logo-text">Watchlist</span>
      </div>
      <div class="header-right">
        <span id="user-email" class="user-email"></span>
        <button class="btn-logout" id="btn-logout">Вийти</button>
      </div>
    </header>

    <main class="main-content">
      <div class="toolbar">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Всі</button>
          <button class="filter-btn" data-filter="to_watch">До перегляду</button>
          <button class="filter-btn" data-filter="watched">Переглянуто</button>
          <button class="filter-btn" data-filter="film">Фільми</button>
          <button class="filter-btn" data-filter="series">Серіали</button>
        </div>
        <button class="btn-add" id="btn-add">+ Додати</button>
      </div>

      <div id="media-grid" class="media-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">🎬</div>
        <p>Каталог порожній. Додай перший фільм!</p>
      </div>
    </main>
  </div>

  <!-- МОДАЛЬНЕ ВІКНО -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Додати</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="media-form">
        <input type="hidden" id="media-id"/>
        <input type="hidden" id="f-poster"/>

        <div class="form-group" style="position:relative">
          <label>Назва *</label>
          <input type="text" id="f-title" placeholder="Назва фільму або серіалу" required/>
        </div>

        <img id="poster-preview" class="poster-preview hidden" src="" alt="Постер"/>

        <div class="form-row two-col">
          <div class="form-group">
            <label>Тип</label>
            <select id="f-type">
              <option value="film">🎬 Фільм</option>
              <option value="series">📺 Серіал</option>
            </select>
          </div>
          <div class="form-group">
            <label>Статус</label>
            <select id="f-status">
              <option value="to_watch">До перегляду</option>
              <option value="watched">Переглянуто</option>
            </select>
          </div>
        </div>
        <div class="form-row two-col">
          <div class="form-group">
            <label>Жанр</label>
            <input type="text" id="f-genre" placeholder="Жанр"/>
          </div>
          <div class="form-group">
            <label>Рік</label>
            <input type="number" id="f-year" placeholder="2024" min="1888" max="2030"/>
          </div>
        </div>
        <div class="form-group">
          <label>Рейтинг <span id="rating-val">—</span></label>
          <input type="range" id="f-rating" min="0" max="10" value="0" class="rating-slider"/>
        </div>
        <div class="form-group">
          <label>Нотатки</label>
          <textarea id="f-notes" placeholder="Враження, коментарі..."></textarea>
        </div>
        <div id="form-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="modal-cancel">Скасувати</button>
          <button type="submit" class="btn-primary">Зберегти</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ПІДТВЕРДЖЕННЯ ВИДАЛЕННЯ -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-overlay" id="confirm-overlay"></div>
    <div class="modal-card small">
      <h3>Видалити?</h3>
      <p id="confirm-text">Цю дію не можна скасувати.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="confirm-cancel">Скасувати</button>
        <button class="btn-danger" id="confirm-ok">Видалити</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
