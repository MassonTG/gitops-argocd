apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas.celery }}
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: {{ .Values.image.backend }}
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: watchlist-config
            - secretRef:
                name: watchlist-secret