apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas.fastapi }}
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: {{ .Values.image.backend }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: watchlist-config
            - secretRef:
                name: watchlist-secret
          resources:
            requests:
              memory: {{ .Values.resources.fastapi.memory | quote }}
              cpu: {{ .Values.resources.fastapi.cpu | quote }}
            limits:
              memory: {{ .Values.resources.fastapi.memory | quote }}
              cpu: {{ .Values.resources.fastapi.cpu | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: fastapi
  ports:
    - port: 8000